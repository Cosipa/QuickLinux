name: Build and Release

on:
  push:
    tags:
      - 'v*'
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile QuickLinux
        run: |
          mkdir -p dist
          cat src/start.ps1 > dist/quicklinux-windows.ps1
          printf "%s\n" "\$script:DistrosJson = @'" >> dist/quicklinux-windows.ps1
          cat config/distros.json >> dist/quicklinux-windows.ps1
          echo "'@" >> dist/quicklinux-windows.ps1
          cat src/download.ps1 src/disk.ps1 src/wsl.ps1 src/ui.ps1 src/main.ps1 >> dist/quicklinux-windows.ps1
      - name: Upload compiled script
        uses: actions/upload-artifact@v4
        with:
          name: quicklinux-compiled
          path: dist/quicklinux-windows.ps1
          retention-days: 1

  test:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester
        run: |
          if (-not (Get-Module -ListAvailable -Name Pester)) {
            Install-Module -Name Pester -Force -SkipPublisherCheck -MinimumVersion 5.0 -Scope CurrentUser
          }
      - name: Run Pester tests
        run: |
          Import-Module Pester -MinimumVersion 5.0
          Invoke-Pester -Path ./tests -Output Detailed -PassThru
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results
          path: ./TestResults/*.xml

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download compiled script
        uses: actions/download-artifact@v4
        with:
          name: quicklinux-compiled
          path: dist
      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" dist/quicklinux-windows.ps1 --clobber
          else
            gh release create "${{ github.ref_name }}" \
              --title "${{ github.ref_name }}" \
              --generate-notes \
              dist/quicklinux-windows.ps1
          fi
