name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Compile QuickLinux
        run: |
          mkdir -p dist
          cat src/start.ps1 > dist/quicklinux-windows.ps1
          echo '$script:DistrosJson = @'"'" >> dist/quicklinux-windows.ps1
          cat config/distros.json >> dist/quicklinux-windows.ps1
          echo "'@" >> dist/quicklinux-windows.ps1
          cat src/download.ps1 src/disk.ps1 src/wsl.ps1 src/ui.ps1 src/main.ps1 >> dist/quicklinux-windows.ps1
      
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/quicklinux-windows.ps1
